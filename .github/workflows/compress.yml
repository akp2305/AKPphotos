name: Optimize & Deploy to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WebP Tool
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - name: Convert Images to WebP
        run: |
          find . -type f \( \
            -iname "*.png" -o \
            -iname "*.jpg" -o \
            -iname "*.jpeg" \
          \) | while read -r img; do
            echo "Optimizing $img..."
            cwebp -q 80 "$img" -o "${img%.*}.webp"
            rm "$img"
          done

      - name: Update HTML References
        run: |
          find . -name "*.html" -exec sed -Ei \
            's/\.(png|PNG|jpg|JPG|jpeg|JPEG)/.webp/g' {} +

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5